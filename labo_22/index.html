<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <title>My Internet Start Page</title>

</head>
<body>

<div class="container mt-4">
    <h1 class="page-title">My Internet Start Page</h1>

    <div class="mb-1">
        <label for="commandInput" class="form-label fw-semibold">Zoekopdracht</label>
        <input
                type="text"
                id="commandInput"
                class="form-control"
                placeholder="Enter commando"
        />
        <div class="form-text">Start your commando with "/[character] [zoekopdracht]*"</div>
    </div>

    <button
            id="goBtn"
            class="btn btn-success w-100 mt-2 go-btn"
            onclick="handleGo()"
    >
        GO!
    </button>

    <hr class="my-4" />
    <h2 class="history-title">History</h2>
    <div id="historyRow" class="row row-cols-1 row-cols-md-3 g-3 mb-4">
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="scripts/script.js"></script>
</body>
</html>
