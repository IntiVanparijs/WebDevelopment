<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Formvalidatie</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>

<h1>Formvalidatie</h1>

<form id="formulier" novalidate>

    <div class="veld">
        <label>Voornaam</label>
        <input type="text" id="voornaam">
        <span class="error"></span>
    </div>

    <div class="veld">
        <label>Familienaam</label>
        <input type="text" id="familienaam">
        <span class="error"></span>
    </div>

    <div class="veld">
        <label>Geboortedatum</label>
        <input type="text" id="geboortedatum" placeholder="jjjj-mm-dd">
        <span class="error"></span>
    </div>

    <div class="veld">
        <label>Email</label>
        <input type="text" id="email">
        <span class="error"></span>
    </div>

    <div class="veld">
        <label>Aantal kinderen</label>
        <input type="text" id="kinderen">
        <span class="error"></span>
    </div>

    <button type="button" id="valideerBtn">Valideer</button>

</form>

<script src="scripts/script.js"></script>
</body>
</html>
